name: GREEDYLM CI/CD v2

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  stabilization:
    name: Core Stabilization
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Linting Tools
        run: pip install ruff pytest httpx
        
      - name: Ruff Check
        run: ruff check core/ --select E,W,F --ignore E501,W291,F401 --exclude core/migrations
        
      - name: Unit Tests
        run: |
          cd core
          pytest ../tests/ -v

  security:
    name: Security Analysis (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python, javascript
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  build:
    name: Docker Build Test
    needs: [stabilization, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker Build (API)
        run: docker build -t greedylm-api ./core
      - name: Docker Build (Worker)
        run: docker build -f ./core/Dockerfile.worker -t greedylm-worker ./core
