name: GREEDYLM CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore: ['**.md', 'docs/**', 'infrastructure/**']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'infrastructure/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests + Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r core/requirements.txt
          pip install ruff pytest-asyncio pytest-timeout httpx aiosqlite

      - name: Lint with Ruff
        run: |
          ruff check core/

      - name: Run tests
        run: |
          python -m pytest tests/ -v --timeout=30
        env:
          PYTHONPATH: .
          ENVIRONMENT: local
          DATABASE_URL: "sqlite+aiosqlite:///test.db"
          REDIS_URL: "redis://localhost:6379/0"
          JWT_SECRET: "test-secret-min-64-chars-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
          QDRANT_URL: "http://localhost:6333"
          STRIPE_SECRET_KEY: "sk_test_dummy_for_ci"
          STRIPE_WEBHOOK_SECRET: "whsec_dummy_for_ci"
          FRONTEND_URL: "http://localhost:3000"
          ENCRYPTION_KEY: "thisisasecretkeyforaes256encryp_ci_test"
          MASTER_KEY_HASH: "ci_test_hash_not_for_production"

  security:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python, javascript
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  build-check:
    name: Docker Build Validation
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and Cache API
        uses: docker/build-push-action@v6
        with:
          context: ./core
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: greedylm-core:test
      - name: Build and Cache Portal
        uses: docker/build-push-action@v6
        with:
          context: ./portal
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: greedylm-portal:test

  publish-sdk:
    name: Publish SDK to PyPI
    needs: [test, build-check]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/project/greedylm/
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set SDK version from tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Tag version: $VERSION"
          sed -i "s/^version = .*/version = \"$VERSION\"/" sdk/python/pyproject.toml
          echo "pyproject.toml after sed:"
          cat sdk/python/pyproject.toml | grep version
      - name: Build SDK
        run: |
          cd sdk/python
          pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/
          password: ${{ secrets.PYPI_API_TOKEN }}