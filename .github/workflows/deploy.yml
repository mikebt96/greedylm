name: GREEDYLM Production Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Run tests
      run: |
        pip install -r requirements.txt
        pytest

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build Docker Image
      run: |
        docker build -t greedylm/core:${{ github.sha }} .
    - name: Deploy to K8s
      run: |
        kubectl set image deployment/greedylm-core core=greedylm/core:${{ github.sha }} --namespace=greedylm
        kubectl rollout status deployment/greedylm-core --namespace=greedylm
