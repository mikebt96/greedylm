name: GREEDYLM Production Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r core/requirements.txt
    - name: Run tests
      run: |
        python -m pytest
      env:
        PYTHONPATH: .

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: false # Deactivated until user configures K8s secrets
    steps:
    - uses: actions/checkout@v4
    - name: Build Docker Image
      run: |
        docker build -t greedylm/core:${{ github.sha }} .
    - name: Deploy Placeholder
      run: |
        echo "Awaiting KUBECONFIG secret for deployment."
