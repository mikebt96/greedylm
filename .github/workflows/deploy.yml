name: GREEDYLM Production Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r core/requirements.txt
    - name: Run tests
      run: |
        python -m pytest
      env:
        PYTHONPATH: .

  build-check:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Validate Backend Docker Build
      run: |
        docker build -t greedylm-core:test ./core
    - name: Validate Frontend Docker Build
      run: |
        docker build -t greedylm-portal:test ./portal
